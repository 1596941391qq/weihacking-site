<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>外链导航 — 5900+ 免费外链提交站点</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%233b5998'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='white' font-family='system-ui' font-weight='bold'>链</text></svg>">
<meta name="description" content="收录 5900+ 个可免费获取外链的站点，按类型、层级、难度分类。涵盖目录、Profile、书签、论坛、Citation 等，助力 SEO 外链建设。">
<style>
:root{--bg:#f4f5f9;--card:#fff;--border:#e8e8ec;--text:#222;--text2:#666;--text3:#999;--blue:#3b5998;--blue-bg:#eef2ff;--green:#1a7f37;--green-bg:#e6f9ed;--orange:#c2410c;--orange-bg:#fff5eb;--red:#c33;--red-bg:#fde8e8;--purple:#7c3aed;--purple-bg:#f3eeff;--tag:#f0f1f5}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

/* 顶栏 */
.topbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 16px}
.topbar-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:12px}
.logo{font-size:1.1rem;font-weight:800;color:var(--text);white-space:nowrap}
.logo span{color:var(--blue)}
.search{flex:1;position:relative;max-width:480px}
.search input{width:100%;padding:8px 12px 8px 32px;border:1px solid var(--border);border-radius:20px;font-size:.85rem;outline:none;background:var(--bg);transition:border .2s}
.search input:focus{border-color:var(--blue);background:#fff}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:.8rem}
.topbar-stats{font-size:.72rem;color:var(--text3);white-space:nowrap}
.topbar-stats b{color:var(--blue)}

/* 分类导航 */
.nav-wrap{background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;position:relative}
.nav-wrap::-webkit-scrollbar{display:none}
.nav-wrap::after{content:'';position:absolute;top:0;right:0;bottom:0;width:32px;background:linear-gradient(to right,transparent,#fff);pointer-events:none}
.nav{max-width:1200px;margin:0 auto;display:flex;gap:4px;padding:8px 16px;white-space:nowrap}
.nav-chip{padding:5px 14px;border-radius:16px;font-size:.78rem;color:var(--text2);background:var(--tag);border:none;cursor:pointer;transition:all .15s}
.nav-chip:hover{background:var(--blue-bg);color:var(--blue)}
.nav-chip.on{background:var(--blue);color:#fff}

/* 筛选条 */
.filter-bar{max-width:1200px;margin:12px auto 0;padding:0 16px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.fsel{padding:4px 10px;border:1px solid var(--border);border-radius:6px;font-size:.72rem;color:var(--text2);background:#fff;outline:none;cursor:pointer}
.fsel:focus{border-color:var(--blue)}
.fsort{margin-left:auto;display:flex;gap:4px}
.fsort button{padding:4px 10px;border:1px solid var(--border);border-radius:5px;font-size:.7rem;color:var(--text2);background:#fff;cursor:pointer}
.fsort button:hover{border-color:var(--blue);color:var(--blue)}
.fsort button.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.export-btn{padding:4px 10px;border:1px solid var(--border);border-radius:5px;font-size:.7rem;color:var(--text2);background:#fff;cursor:pointer}
.export-btn:hover{color:var(--green);border-color:var(--green)}

/* 卡片网格 */
.main{max-width:1200px;margin:0 auto;padding:12px 16px 60px}
.result-info{font-size:.72rem;color:var(--text3);margin-bottom:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;transition:box-shadow .15s,transform .15s;display:flex;flex-direction:column}
.card:hover{box-shadow:0 2px 12px rgba(0,0,0,.07);transform:translateY(-1px)}
.c-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.c-icon{width:32px;height:32px;border-radius:8px;background:var(--tag);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:var(--blue);flex-shrink:0;text-transform:uppercase}
.c-info{flex:1;min-width:0}
.c-name{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-name a{color:var(--text);text-decoration:none}
.c-name a:hover{color:var(--blue)}
.c-url{font-size:.62rem;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-tags{display:flex;flex-wrap:wrap;gap:3px;margin:6px 0}
.ct{font-size:.6rem;padding:2px 6px;border-radius:3px;font-weight:500}
.ct-sec{font-size:.55rem;padding:1px 5px;opacity:.75}
/* 骨架屏 */
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.sk-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.sk-line{height:10px;border-radius:5px;background:linear-gradient(90deg,var(--tag) 25%,#e8e8ec 50%,var(--tag) 75%);background-size:800px 100%;animation:shimmer 1.5s infinite}
.sk-w60{width:60%}.sk-w40{width:40%}.sk-w80{width:80%}.sk-mt8{margin-top:8px}.sk-mt6{margin-top:6px}
.ct-type{background:var(--purple-bg);color:var(--purple)}
.ct-t1{background:var(--green-bg);color:var(--green)}
.ct-t2{background:var(--blue-bg);color:var(--blue)}
.ct-t3{background:var(--tag);color:var(--text3)}
.ct-df-y{background:var(--green-bg);color:var(--green)}
.ct-df-n{background:var(--red-bg);color:var(--red)}
.ct-df-m{background:var(--orange-bg);color:var(--orange)}
.ct-df-u{background:var(--tag);color:var(--text3)}
.ct-free{background:var(--green-bg);color:var(--green)}
.ct-paid{background:var(--orange-bg);color:var(--orange)}
.ct-lang{background:#e8f4fd;color:#0891b2}
.dr-h{background:var(--green-bg);color:var(--green);font-weight:700}
.dr-m{background:var(--blue-bg);color:var(--blue);font-weight:600}
.dr-l{background:var(--orange-bg);color:var(--orange)}
.dr-n{background:var(--tag);color:var(--text3)}
.c-desc{font-size:.72rem;color:var(--text2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-top:auto}
.c-ease{margin-top:6px;display:flex;align-items:center;gap:6px}
.c-ease .eb{flex:1;height:3px;background:var(--tag);border-radius:2px;overflow:hidden}
.c-ease .ef{height:100%;border-radius:2px}
.ef.easy{background:var(--green)}.ef.mid{background:var(--orange)}.ef.hard{background:var(--red)}
.c-ease .el{font-size:.55rem;color:var(--text3);min-width:36px}

/* 分页 */
.pager{display:flex;justify-content:center;align-items:center;gap:12px;margin-top:20px}
.pager button{padding:8px 20px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text2);font-size:.82rem;cursor:pointer}
.pager button:hover{border-color:var(--blue);color:var(--blue)}
.pager button:disabled{opacity:.3;cursor:default}
.pager .pi{font-size:.75rem;color:var(--text3)}

/* 页脚 */
.foot{text-align:center;padding:20px 16px;color:var(--text3);font-size:.68rem;border-top:1px solid var(--border);background:#fff}

/* 移动端 */
@media(max-width:768px){
  .topbar-inner{flex-wrap:wrap;gap:8px}
  .search{order:3;max-width:100%;flex-basis:100%}
  .topbar-stats{display:none}
  .grid{grid-template-columns:1fr 1fr;gap:8px}
  .card{padding:10px 12px}
  .c-icon{width:28px;height:28px;font-size:.65rem}
  .c-desc{-webkit-line-clamp:1}
}
@media(max-width:480px){
  .grid{grid-template-columns:1fr}
  .filter-bar{gap:4px}
  .fsort{margin-left:0;width:100%;justify-content:flex-start;overflow-x:auto}
  .nav{padding:6px 12px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="logo">外链<span>导航</span></div>
    <div class="search">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="搜索站点名称、域名或描述…">
    </div>
    <div class="topbar-stats">共 <b id="hTotal">-</b> 个站点 · Tier 1 <b id="hT1">-</b> · Dofollow <b id="hDF">-</b></div>
  </div>
</div>

<div class="nav-wrap">
  <div class="nav" id="navBar">
    <button class="nav-chip on" data-cat="">全部</button>
    <button class="nav-chip" data-cat="directory">目录提交</button>
    <button class="nav-chip" data-cat="profile">Profile</button>
    <button class="nav-chip" data-cat="bookmark">书签</button>
    <button class="nav-chip" data-cat="forum">论坛</button>
    <button class="nav-chip" data-cat="citation">Citation</button>
    <button class="nav-chip" data-cat="submission">投稿</button>
    <button class="nav-chip" data-cat="social">社交</button>
    <button class="nav-chip" data-cat="edu">.edu</button>
    <button class="nav-chip" data-cat="gov">.gov</button>
  </div>
</div>

<div class="filter-bar">
  <select class="fsel" id="fTier"><option value="">所有层级</option><option value="1">Tier 1 高权威</option><option value="2">Tier 2 中等</option><option value="3">Tier 3 批量</option></select>
  <select class="fsel" id="fDR"><option value="">所有DR</option><option value="90">DR 90+</option><option value="70">DR 70+</option><option value="50">DR 50+</option><option value="30">DR 30+</option></select>
  <select class="fsel" id="fDF"><option value="">Dofollow</option><option value="true">是</option><option value="likely_true">可能是</option><option value="false">否</option></select>
  <select class="fsel" id="fLang"><option value="">语言</option></select>
  <select class="fsel" id="fCost"><option value="">费用</option><option value="free">免费</option><option value="freemium">免费增值</option><option value="paid">付费</option></select>
  <div class="fsort">
    <button class="on" onclick="doSort('dr',this)">权重 ↓</button>
    <button onclick="doSort('diff',this)">最易 ↑</button>
    <button onclick="doSort('name',this)">A-Z</button>
  </div>
  <button class="export-btn" onclick="exportCSV()">导出 CSV</button>
</div>

<div class="main">
  <div class="result-info" id="count">加载中…</div>
  <div class="grid" id="grid"><div class="sk-card"><div class="sk-line sk-w60 sk-mt8"></div><div class="sk-line sk-w40 sk-mt6"></div><div class="sk-line sk-w80 sk-mt6" style="height:6px"></div></div><div class="sk-card"><div class="sk-line sk-w60 sk-mt8"></div><div class="sk-line sk-w40 sk-mt6"></div><div class="sk-line sk-w80 sk-mt6" style="height:6px"></div></div><div class="sk-card"><div class="sk-line sk-w60 sk-mt8"></div><div class="sk-line sk-w40 sk-mt6"></div><div class="sk-line sk-w80 sk-mt6" style="height:6px"></div></div><div class="sk-card"><div class="sk-line sk-w60 sk-mt8"></div><div class="sk-line sk-w40 sk-mt6"></div><div class="sk-line sk-w80 sk-mt6" style="height:6px"></div></div><div class="sk-card"><div class="sk-line sk-w60 sk-mt8"></div><div class="sk-line sk-w40 sk-mt6"></div><div class="sk-line sk-w80 sk-mt6" style="height:6px"></div></div><div class="sk-card"><div class="sk-line sk-w60 sk-mt8"></div><div class="sk-line sk-w40 sk-mt6"></div><div class="sk-line sk-w80 sk-mt6" style="height:6px"></div></div><div class="sk-card"><div class="sk-line sk-w60 sk-mt8"></div><div class="sk-line sk-w40 sk-mt6"></div><div class="sk-line sk-w80 sk-mt6" style="height:6px"></div></div><div class="sk-card"><div class="sk-line sk-w60 sk-mt8"></div><div class="sk-line sk-w40 sk-mt6"></div><div class="sk-line sk-w80 sk-mt6" style="height:6px"></div></div><div class="sk-card"><div class="sk-line sk-w60 sk-mt8"></div><div class="sk-line sk-w40 sk-mt6"></div><div class="sk-line sk-w80 sk-mt6" style="height:6px"></div></div><div class="sk-card"><div class="sk-line sk-w60 sk-mt8"></div><div class="sk-line sk-w40 sk-mt6"></div><div class="sk-line sk-w80 sk-mt6" style="height:6px"></div></div><div class="sk-card"><div class="sk-line sk-w60 sk-mt8"></div><div class="sk-line sk-w40 sk-mt6"></div><div class="sk-line sk-w80 sk-mt6" style="height:6px"></div></div><div class="sk-card"><div class="sk-line sk-w60 sk-mt8"></div><div class="sk-line sk-w40 sk-mt6"></div><div class="sk-line sk-w80 sk-mt6" style="height:6px"></div></div></div>
  <div class="pager" id="pager"></div>
</div>

<div class="foot">外链导航 — 收录 <span id="ftTotal">-</span> 个可提交站点 · 数据更新于 <span id="ftDate">-</span><br>链接金字塔：Tier 1（高权威实体页）→ Tier 2（Web 2.0/论坛/目录）→ Tier 3（书签/Profile 批量资产）</div>

<script>
let ALL=[],filtered=[],page=0,PP=48,sortBy='dr';

async function init(){
  try{
    let r;
    try{r=await fetch('data/backlink-data.json')}catch(e){}
    if(!r||!r.ok)r=await fetch('../data/backlink-data.json');
    if(!r.ok)throw r.status;
    const j=await r.json();
    const raw=j.records||j;
    ALL=raw.filter(x=>!x.notes||!x.notes.startsWith('DEAD'));
    const m=j.meta||{};
    document.getElementById('hTotal').textContent=ALL.length.toLocaleString();
    document.getElementById('ftTotal').textContent=ALL.length;
    document.getElementById('ftDate').textContent=m.generated||'-';
    document.getElementById('hT1').textContent=ALL.filter(x=>x.tier==='1').length.toLocaleString();
    document.getElementById('hDF').textContent=(ALL.filter(x=>x.dofollow==='true').length+ALL.filter(x=>x.dofollow==='likely_true').length).toLocaleString();
    fillSel('fLang',[...new Set(ALL.map(x=>x.language).filter(Boolean))].sort());
    // nav click
    document.querySelectorAll('.nav-chip').forEach(btn=>{
      btn.addEventListener('click',()=>{
        document.querySelectorAll('.nav-chip').forEach(b=>b.classList.remove('on'));
        btn.classList.add('on');
        apply();
      });
    });
    apply();
  }catch(e){
    document.getElementById('grid').innerHTML='<p style="padding:40px;text-align:center;color:#999">加载失败，请先运行构建脚本</p>';
  }
}

function fillSel(id,arr){
  const el=document.getElementById(id);
  arr.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;el.appendChild(o)});
}

function apply(){
  const q=document.getElementById('search').value.toLowerCase();
  const nav=document.querySelector('.nav-chip.on')?.dataset.cat||'';
  const fti=document.getElementById('fTier').value;
  const fdr=document.getElementById('fDR').value;
  const fdf=document.getElementById('fDF').value;
  const fl=document.getElementById('fLang').value;
  const fc=document.getElementById('fCost').value;
  filtered=ALL.filter(r=>{
    if(nav&&r.type!==nav)return false;
    if(fti&&r.tier!==fti)return false;
    if(fdf&&r.dofollow!==fdf)return false;
    if(fl&&r.language!==fl)return false;
    if(fc&&r.free_or_paid!==fc)return false;
    if(fdr){const mn=parseInt(fdr);if(fdr==='0'){if(r.dr!=null&&r.dr>=30)return false}else{if(r.dr==null||r.dr<mn)return false}}
    if(q){const h=((r.name||'')+' '+(r.domain||'')+' '+(r.url||'')+' '+(r.desc||'')).toLowerCase();if(!h.includes(q))return false}
    return true;
  });
  dosort();page=0;
  document.getElementById('count').textContent=`找到 ${filtered.length} 个站点`;
  render();
}

function dosort(){
  const d={dr:-1,diff:1,name:1}[sortBy]||1;
  filtered.sort((a,b)=>{
    let va,vb;
    if(sortBy==='dr'){va=a.dr||0;vb=b.dr||0}
    else if(sortBy==='diff'){va=a.difficulty||0;vb=b.difficulty||0}
    else{va=(a.name||'').toLowerCase();vb=(b.name||'').toLowerCase()}
    return va<vb?-1*d:va>vb?1*d:0;
  });
}

function doSort(s,btn){
  sortBy=s;
  document.querySelectorAll('.fsort button').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  dosort();page=0;render();
}

function render(){
  const g=document.getElementById('grid');
  const s=page*PP;
  const sl=filtered.slice(s,s+PP);
  if(filtered.length===0){
    g.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px 20px"><div style="font-size:2rem;margin-bottom:12px">🔍</div><div style="font-size:.95rem;font-weight:600;color:var(--text2);margin-bottom:6px">没有找到匹配的站点</div><div style="font-size:.78rem;color:var(--text3)">试试换个关键词，或减少筛选条件</div></div>';
    document.getElementById('pager').innerHTML='';
    return;
  }
  g.innerHTML=sl.map(r=>{
    const dc=r.dr>=80?'dr-h':r.dr>=50?'dr-m':r.dr?'dr-l':'dr-n';
    const tc=r.tier==='1'?'ct-t1':r.tier==='2'?'ct-t2':'ct-t3';
    const dfc=r.dofollow==='true'?'ct-df-y':r.dofollow==='false'?'ct-df-n':r.dofollow==='likely_true'||r.dofollow==='likely_false'?'ct-df-m':'ct-df-u';
    const dfLabel=r.dofollow==='true'?'Dofollow':r.dofollow==='false'?'Nofollow':r.dofollow==='likely_true'?'可能DF':r.dofollow==='likely_false'?'可能NF':'未知';
    const diff=r.difficulty||0;
    const bc=diff<=3?'easy':diff<=6?'mid':'hard';
    const lang=r.language&&r.language!=='en'?'<span class="ct ct-sec ct-lang">'+esc(r.language)+'</span>':'';
    const cost=r.free_or_paid&&r.free_or_paid!=='free'?'<span class="ct ct-sec ct-'+r.free_or_paid+'">'+(r.free_or_paid==='freemium'?'免费增值':'付费')+'</span>':'<span class="ct ct-sec ct-free">免费</span>';
    const ease=diff?`<div class="c-ease"><span class="el">易用度 ${10-diff}/10</span><div class="eb"><div class="ef ${bc}" style="width:${(10-diff)*10}%"></div></div></div>`:'';
    const icon=(r.name||'?')[0].toUpperCase();
    return `<div class="card">
      <div class="c-head">
        <div class="c-icon">${icon}</div>
        <div class="c-info">
          <div class="c-name"><a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.name||r.domain)}</a></div>
          <div class="c-url">${esc(r.url)}</div>
        </div>
      </div>
      <div class="c-tags">
        <span class="ct ct-type">${esc(r.type)}</span>
        <span class="ct ${tc}">T${esc(r.tier)}</span>
        <span class="ct ${dfc}">${dfLabel}</span>
        ${r.dr?`<span class="ct ${dc}">DR ${r.dr}</span>`:''}
        ${lang}${cost}
      </div>
      ${r.desc?'<div class="c-desc">'+esc(r.desc)+'</div>':''}
      ${ease}
    </div>`;
  }).join('');
  const total=filtered.length,pages=Math.ceil(total/PP);
  const pg=document.getElementById('pager');
  if(pages<=1){pg.innerHTML='';return}
  pg.innerHTML=`<button ${page===0?'disabled':''} onclick="goPage(${page-1})">上一页</button>
    <span class="pi">${s+1}–${Math.min(s+PP,total)} / ${total}</span>
    <button ${page>=pages-1?'disabled':''} onclick="goPage(${page+1})">下一页</button>`;
}

function goPage(p){page=p;render();window.scrollTo({top:document.querySelector('.main').offsetTop-60,behavior:'smooth'})}

function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}

function exportCSV(){
  const h=['名称','网址','类型','层级','DR','Dofollow','难度','语言','费用','描述'];
  const rows=filtered.map(r=>h.map((_,i)=>{
    const m=[r.name,r.url,r.type,r.tier,r.dr,r.dofollow,r.difficulty,r.language,r.free_or_paid,r.desc];
    return '"'+String(m[i]||'').replace(/"/g,'""')+'"';
  }).join(','));
  const csv='\uFEFF'+h.join(',')+'\n'+rows.join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download='外链导航-'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

document.getElementById('search').addEventListener('input',apply);
['fTier','fDR','fDF','fLang','fCost'].forEach(id=>document.getElementById(id).addEventListener('change',apply));

init();
</script>
</body>
</html>
